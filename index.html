      function renderFeedback(stepId, html) {
        const el = document.getElementById(`error-feedback-${stepId}`);
        if (!el) return;
        el.innerHTML = html;
      }

      async function markResultHelpful(
        key,
        btn,
        text = "感谢反馈，这条结果会优先保留给你参考。",
        errorId = null
      ) {
        setStoredFeedback(key, {
          status: "helpful",
          note: text
        });

        if (errorId) {
          try {
            await fetch(`${API_BASE}/errors/${errorId}/feedback`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ type: "helpful" })
            });
          } catch {}
        }

        btn.disabled = true;
        btn.textContent = "已反馈有帮助";
        const parent = btn.parentElement;
        let msg = parent.querySelector(".inline-msg.feedback-status");
        if (!msg) {
          msg = document.createElement("span");
          msg.className = "inline-msg ok feedback-status";
          parent.appendChild(msg);
        }
        msg.textContent = text;
      }

      async function markResultNotSolved(key, stepId, source, btn, errorId = null) {
        setStoredFeedback(key, {
          status: "not_solved"
        });

        if (errorId) {
          try {
            await fetch(`${API_BASE}/errors/${errorId}/feedback`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ type: "not_solved" })
            });
          } catch {}
        }

        btn.disabled = true;
        btn.textContent = "已记录没解决";

        if (source === "library") {
          renderFeedback(
            stepId,
            `
              <div class="feedback-box">
                <div class="feedback-title">这批历史记录没有解决你的问题</div>
                <div class="feedback-text">
                  建议切换到 AI 分析，AI 会结合当前命令、系统、版本和原始输出重新给出针对性步骤。
                </div>
                <div class="feedback-actions">
                  <button class="btn success" onclick="analyzeWithAI('${stepId}')">改用 AI 分析</button>
                  <button class="btn secondary" onclick="copyText(${JSON.stringify(getFullErrorText(stepId))}, '已复制当前报错')">复制当前报错</button>
                </div>
              </div>
            `
          );
          return;
        }

        renderFeedback(
          stepId,
          `
            <div class="feedback-box">
              <div class="feedback-title">AI 结果还没有解决问题</div>
              <div class="feedback-text">
                你可以重新分析，或者把当前报错复制出来继续排查；如果你已经找到新解法，也可以稍后保存为新的报错库记录。
              </div>
              <div class="feedback-actions">
                <button class="btn secondary" onclick="analyzeWithAI('${stepId}')">重新分析</button>
                <button class="btn warn" onclick="searchLibrary('${stepId}')">重新查报错库</button>
                <button class="btn secondary" onclick="copyText(${JSON.stringify(getFullErrorText(stepId))}, '已复制当前报错')">复制当前报错</button>
              </div>
            </div>
          `
        );
      }

      function changeSearchSort(stepId, sort) {
        setSearchPref(stepId, { sort, limit: 5 });
        searchLibrary(stepId);
      }

      function changeSearchSource(stepId, source) {
        setSearchPref(stepId, { source, limit: 5 });
        searchLibrary(stepId);
      }

      function toggleVersionFilter(stepId, checked) {
        setSearchPref(stepId, { sameVersionOnly: checked, limit: 5 });
        searchLibrary(stepId);
      }

      function toggleHighVotesFilter(stepId, checked) {
        setSearchPref(stepId, { minVotes: checked ? 1 : 0, limit: 5 });
        searchLibrary(stepId);
      }

      function resetSearchFilters(stepId) {
        state.searchPrefs[stepId] = {
          sort: "best",
          limit: 5,
          source: "all",
          sameVersionOnly: false,
          minVotes: 0
        };
        searchLibrary(stepId);
      }

      function setInstallMode(mode) {
        state.installMode = mode === "mirror" ? "mirror" : "official";
        saveInstallMode();
        renderStepsMode();
        renderSteps();
      }

      function isStepNoteExpanded(stepId) {
        return Boolean(state.stepNotePrefs[stepId]);
      }

      function toggleStepNote(stepId) {
        state.stepNotePrefs[stepId] = !isStepNoteExpanded(stepId);
        saveStepNotePrefs();
        renderSteps();
      }

      function renderCommonActions() {
        const container = document.getElementById("common-actions");
        if (!container) return;

        container.innerHTML = COMMON_ACTIONS
          .map(
            (action) => `
              <div class="common-action-card">
                <div class="common-action-title">
                  <div>
                    <h3>${escapeHtml(action.title)}</h3>
                    <div class="common-action-desc">${escapeHtml(action.description)}</div>
                  </div>
                </div>
                <div class="step-command">${escapeHtml(action.cmd)}</div>
                <div class="step-actions">
                  <button class="btn ${action.tone === "secondary" ? "secondary" : action.tone}" onclick="runCommonAction('${action.id}')">▶ 执行</button>
                  <button class="btn secondary" onclick="copyCommonAction('${action.id}')">📋 复制</button>
                  <button class="btn secondary" onclick="stopCommonAction('${action.id}')">停止</button>
                </div>
                <div class="terminal" id="term-common-${action.id}"></div>
              </div>
            `
          )
          .join("");

        COMMON_ACTIONS.forEach((action) => {
          renderTerminal(getCommonActionRunId(action.id));
        });
      }

      function renderStepsMode() {
        const officialBtn = document.getElementById("mode-official");
        const mirrorBtn = document.getElementById("mode-mirror");
        if (!officialBtn || !mirrorBtn) return;
        officialBtn.classList.toggle("active", state.installMode === "official");
        mirrorBtn.classList.toggle("active", state.installMode === "mirror");
      }

      function loadMoreSimilar(stepId) {
        const current = getSearchPref(stepId);
        setSearchPref(stepId, {
          limit: Math.min((current.limit || 5) + 5, 50)
        });
        searchLibrary(stepId);
      }

      function runInlineCommand(stepId, command, button) {
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          toast("Bridge 未连接，当前无法一键执行");
          return;
        }

        if (!canInlineRunCommand(command)) {
          toast("该命令不在一键执行白名单内");
          return;
        }

        const runId = createInlineRunId(stepId);
        const buttonId =
          button.id || `inline-run-btn-${Math.random().toString(16).slice(2, 8)}`;
        button.id = buttonId;
        let statusEl = button.parentElement?.querySelector(".run-status");
        if (!statusEl) {
          statusEl = document.createElement("span");
          statusEl.className = "run-status";
          button.parentElement?.appendChild(statusEl);
        }
        const statusId =
          statusEl.id || `inline-run-status-${Math.random().toString(16).slice(2, 8)}`;
        statusEl.id = statusId;
        state.inlineRuns[runId] = {
          stepId,
          buttonId,
          statusId,
          command
        };

        appendLine(stepId, `[AI 步骤] 执行: ${command}`, "ok");
        updateInlineRunUi(runId, {
          disabled: true,
          buttonText: "发送中",
          statusText: "命令已发送到 Bridge",
          statusClass: ""
        });
        state.ws.send(JSON.stringify({ id: runId, type: "run", command }));
      }

      function runInlineCommandFromQueue(queueId, stepId, command) {
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          updateQueueStatus(stepId, "Bridge 未连接，队列已停止", "warn");
          appendQueueLog(stepId, "Bridge 未连接，无法继续队列", "warn");
          return;
        }

        const runId = createInlineRunId(stepId);
        const queue = state.aiQueues[queueId];
        state.inlineRuns[runId] = {
          stepId,
          buttonId: "",
          statusId: "",
          command,
          queueId
        };
        if (queue) {
          queue.currentRunId = runId;
          queue.currentCommand = command;
          queue.skipRequested = false;
        }

        appendLine(stepId, `[AI 队列] 执行: ${command}`, "ok");
        updateQueueStatus(stepId, `队列执行中：${command}`, "");
        appendQueueLog(stepId, `开始执行：${command}`);
        state.ws.send(JSON.stringify({ id: runId, type: "run", command }));
      }

      function processNextInlineQueue(queueId) {
        const queue = state.aiQueues[queueId];
        if (!queue || queue.cancelled) {
          return;
        }

        if (queue.paused) {
          updateQueueStatus(queue.stepId, "队列已暂停，等待继续", "warn");
          appendQueueLog(queue.stepId, "队列暂停，等待继续", "warn");
          return;
        }

        if (queue.index >= queue.commands.length) {
          updateQueueStatus(queue.stepId, `队列执行完成，共 ${queue.commands.length} 条`, "ok");
          appendQueueLog(queue.stepId, `队列完成，共执行 ${queue.commands.length} 条命令`, "ok");
          delete state.aiQueues[queueId];
          return;
        }

        const command = queue.commands[queue.index];
        queue.index += 1;
        runInlineCommandFromQueue(queueId, queue.stepId, command);
      }

      function runInlineCommandQueue(stepId, commands) {
        const runnable = (commands || []).filter((cmd) => canInlineRunCommand(cmd));
        if (!runnable.length) {
          toast("没有可执行的 AI 命令");
          return;
        }

        cancelInlineCommandQueue(stepId, false);
        const queueId = createQueueId(stepId);
        state.aiQueues[queueId] = {
          stepId,
          commands: runnable,
          index: 0,
          cancelled: false,
          paused: false,
          currentRunId: null,
          currentCommand: "",
          skipRequested: false
        };
        updateQueueStatus(stepId, `队列已启动，准备执行 ${runnable.length} 条命令`, "");
        appendQueueLog(stepId, `队列启动，共 ${runnable.length} 条命令`);
        processNextInlineQueue(queueId);
      }

      function pauseInlineCommandQueue(stepId) {
        const queueEntry = Object.entries(state.aiQueues).find(
          ([, queue]) => queue.stepId === stepId
        );
        if (!queueEntry) {
          updateQueueStatus(stepId, "当前没有运行中的队列", "");
          return;
        }

        const [, queue] = queueEntry;
        queue.paused = true;
        updateQueueStatus(
          stepId,
          queue.currentRunId
            ? "队列已暂停，当前命令结束后不会继续"
            : "队列已暂停",
          "warn"
        );
        appendQueueLog(stepId, "队列已暂停", "warn");
      }

      function resumeInlineCommandQueue(stepId) {
        const queueEntry = Object.entries(state.aiQueues).find(
          ([, queue]) => queue.stepId === stepId
        );
        if (!queueEntry) {
          updateQueueStatus(stepId, "当前没有运行中的队列", "");
          return;
        }

        const [queueId, queue] = queueEntry;
        queue.paused = false;
        appendQueueLog(stepId, "队列已继续", "ok");

        if (queue.currentRunId) {
          updateQueueStatus(stepId, `队列已继续，等待当前命令完成：${queue.currentCommand}`, "");
          return;
        }

        updateQueueStatus(stepId, "队列已继续，准备执行下一条", "");
        processNextInlineQueue(queueId);
      }

      function stopCurrentQueueCommand(stepId) {
        const queueEntry = Object.entries(state.aiQueues).find(
          ([, queue]) => queue.stepId === stepId
        );
        if (!queueEntry) {
          updateQueueStatus(stepId, "当前没有运行中的队列", "");
          return;
        }

        const [, queue] = queueEntry;
        if (!queue.currentRunId) {
          updateQueueStatus(stepId, "当前没有正在执行的命令", "");
          return;
        }

        queue.paused = true;
        updateQueueStatus(stepId, `正在中断：${queue.currentCommand}`, "warn");
        appendQueueLog(stepId, `请求中断当前命令：${queue.currentCommand}`, "warn");
        state.ws.send(JSON.stringify({ id: queue.currentRunId, type: "stop" }));
      }

      function stopStepCommand(stepId) {
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          toast("Bridge 未连接，当前无法中断命令");
          return;
        }
        state.ws.send(JSON.stringify({ id: stepId, type: "stop" }));
      }

      function skipInlineCommandQueue(stepId) {
        const queueEntry = Object.entries(state.aiQueues).find(
          ([, queue]) => queue.stepId === stepId
        );
        if (!queueEntry) {
          updateQueueStatus(stepId, "当前没有运行中的队列", "");
          return;
        }

        const [, queue] = queueEntry;
        if (!queue.currentRunId) {
          updateQueueStatus(stepId, "当前没有正在执行的命令，下一条会自动继续", "");
          return;
        }

        queue.skipRequested = true;
        updateQueueStatus(
          stepId,
          `已标记跳过：${queue.currentCommand}，等待当前命令结束后继续`,
          "warn"
        );
        appendQueueLog(stepId, `已标记跳过当前命令：${queue.currentCommand}`, "warn");
      }

      function cancelInlineCommandQueue(stepId, announce = true) {
        const queueEntry = Object.entries(state.aiQueues).find(
          ([, queue]) => queue.stepId === stepId
        );
        if (!queueEntry) {
          if (announce) {
            updateQueueStatus(stepId, "当前没有运行中的队列", "");
          }
          return;
        }

        const [queueId, queue] = queueEntry;
        queue.cancelled = true;
        delete state.aiQueues[queueId];
        updateQueueStatus(stepId, "队列已取消", "warn");
        appendQueueLog(stepId, "队列已取消", "warn");
      }

      function markStepDone(stepId) {
        localStorage.setItem(`step_${stepId}_status`, "done");
        renderSteps();
      }

      function isStepDone(stepId) {
        return localStorage.getItem(`step_${stepId}_status`) === "done";
      }

      function switchOS(nextOS) {
        state.os = nextOS;
        document.getElementById("workspace-input").value = getWorkspaceDefault();
        renderHeader();
        renderStepsMode();
        renderSteps();
        loadConfigPaths();
      }

      function renderHeader() {
        document.getElementById("detected-os-chip").textContent =
          `当前系统：${state.os === "windows" ? "Windows" : "macOS"}`;
        const bridgeStatus = document.getElementById("bridge-status");
        const bridgeNotice = document.getElementById("bridge-notice");
        bridgeStatus.textContent = state.bridgeReady ? "Bridge 已连接" : "Bridge 未连接";
        bridgeStatus.className = `status ${state.bridgeReady ? "ok" : "bad"}`;

        if (state.bridgeReady) {
          bridgeNotice.className = "notice hidden";
          bridgeNotice.innerHTML = "";
        } else {
          bridgeNotice.className = "notice";
          bridgeNotice.innerHTML =
            '未检测到本地 Bridge 服务。你仍然可以复制命令手动执行。<br>如果要启用一键运行和一键写入，请先运行 <span class="mono">npm install</span> 和 <span class="mono">node bridge.js</span>。';
        }
      }

      function renderSystemInfo() {
        const versionEl = document.getElementById("info-version");
        const gatewayEl = document.getElementById("info-gateway");
        const gatewayDetailEl = document.getElementById("info-gateway-detail");
        const gatewayUrlEl = document.getElementById("info-gateway-url");
        const storageEl = document.getElementById("info-storage");
        const configPathEl = document.getElementById("info-config-path");

        if (!state.systemInfo) {
          versionEl.textContent = "未获取";
          gatewayEl.textContent = "未获取";
          gatewayDetailEl.textContent = "未获取";
          gatewayUrlEl.textContent = "未获取";
          storageEl.textContent = "未获取";
          configPathEl.textContent = "未获取";
          return;
        }

        const { openclaw, gateway, storageMode, configPath } = state.systemInfo;
        versionEl.textContent = openclaw?.installed ? openclaw.version || "已安装" : "未检测到";
        gatewayEl.textContent = gateway?.summary || (gateway?.ok ? "可用" : "未就绪");
        gatewayDetailEl.textContent =
          gateway?.output?.split("\n")[0] || gateway?.command || "未检测到";
        gatewayUrlEl.innerHTML = gateway?.dashboardUrl
          ? `<a class="link-btn" href="${gateway.dashboardUrl}" target="_blank">${gateway.dashboardUrl}</a>`
          : "未检测到";
        storageEl.textContent = storageMode === "sqlite" ? "SQLite" : "JSON fallback";
        configPathEl.textContent = configPath || "未检测到";
      }

      function syncSystemInfoToSteps() {
        const info = state.systemInfo;
        if (!info) return;

        if (info.openclaw?.installed) {
          localStorage.setItem("step_version_status", "done");
          if (info.openclaw.version) {
            const output = state.stepOutputs.version || {
              lines: [],
              exitCode: 0,
              terminal: []
            };
            const alreadyShown = output.terminal.some(
              (item) => item.text === info.openclaw.version
            );
            if (!alreadyShown) {
              state.stepOutputs.version = output;
              appendLine("version", info.openclaw.version);
            }
          }
        }

        if (info.gateway?.ok) {
          localStorage.setItem("step_gateway_status", "done");
        }

        renderSteps();
      }

      function renderSteps() {
        const container = document.getElementById("steps");
        container.innerHTML = getSteps()
          .map((step, index) => {
            const done = isStepDone(step.id);
            const noteExpanded = isStepNoteExpanded(step.id);
            return `
              <div class="step-card ${done ? "done" : ""}" id="step-${step.id}">
                <div class="step-header">
                  <div>
                    <h3>步骤 ${index + 1}：${step.title}</h3>
                    <div class="muted">${done ? "已完成，可重复执行" : "未完成"}</div>
                    ${
                      step.note
                        ? `
                          <button class="btn secondary step-note-toggle" onclick="toggleStepNote('${step.id}')">
                            ${noteExpanded ? "收起说明" : "展开说明"}
                          </button>
                          <div class="step-note ${noteExpanded ? "" : "hidden"}">${escapeHtml(step.note)}</div>
                        `
                        : ""
                    }
                  </div>
                  <div>
                    ${step.badge ? `<div class="step-badge">${escapeHtml(step.badge)}</div>` : ""}
                    <div class="status ${done ? "ok" : ""}" style="margin-top: 8px;">${done ? "已完成" : "待执行"}</div>
                  </div>
                </div>
                <div class="step-command">${escapeHtml(step.cmd)}</div>
                <div class="step-actions" style="margin-top: 12px;">
                  <button class="btn" onclick="runStep('${step.id}')">▶ 运行</button>
                  <button class="btn secondary" onclick="copyCommand('${step.id}')">📋 复制</button>
                  <button class="btn secondary" onclick="stopStepCommand('${step.id}')">停止</button>
                </div>
                <div class="terminal" id="term-${step.id}"></div>
              </div>
            `;
          })
          .join("");
        renderAllTerminals();
      }

      function getStepById(stepId) {
        return getSteps().find((step) => step.id === stepId);
      }

      function appendLine(stepId, text, cls = "") {
        if (!state.stepOutputs[stepId]) {
          state.stepOutputs[stepId] = { lines: [], exitCode: null, terminal: [] };
        }

        state.stepOutputs[stepId].terminal.push({
          text,
          cls
        });

        const term = getTerminalElement(stepId);
        if (!term) return;
        const line = document.createElement("div");
        line.className = `term-line ${cls}`.trim();
        line.textContent = text;
        term.appendChild(line);
        term.scrollTop = term.scrollHeight;
      }

      function renderTerminal(stepId) {
        const term = getTerminalElement(stepId);
        if (!term) return;

        const terminalLines = state.stepOutputs[stepId]?.terminal || [];
        term.innerHTML = "";

        terminalLines.forEach((item) => {
          const line = document.createElement("div");
          line.className = `term-line ${item.cls || ""}`.trim();
          line.textContent = item.text;
          term.appendChild(line);
        });

        term.scrollTop = term.scrollHeight;
      }

      function renderAllTerminals() {
        getSteps().forEach((step) => {
          renderTerminal(step.id);
        });
        COMMON_ACTIONS.forEach((action) => {
          renderTerminal(getCommonActionRunId(action.id));
        });
      }

      function connectWS() {
        const ws = new WebSocket(WS_URL);
        state.ws = ws;

        ws.onopen = () => {
          state.bridgeReady = true;
          renderHeader();
        };

        ws.onclose = () => {
          state.bridgeReady = false;
          renderHeader();
          setTimeout(connectWS, 1500);
        };

        ws.onerror = () => {
          state.bridgeReady = false;
          renderHeader();
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          handleBridgeMsg(data);
        };
      }

      function handleBridgeMsg(message) {
        const inlineRun = state.inlineRuns[message.id];
        const stepId = inlineRun?.stepId || message.id;
        if (!stepId) return;

        if (!state.stepOutputs[stepId]) {
          state.stepOutputs[stepId] = { lines: [], exitCode: null, terminal: [] };
        }

        if (message.type === "started") {
          if (inlineRun) {
            updateInlineRunUi(message.id, {
              buttonText: "执行中",
              statusText: "命令开始执行",
              statusClass: ""
            });
          }
          appendLine(stepId, message.data);
          return;
        }

        if (message.type === "stopping") {
          appendLine(stepId, message.data, "warn");
          if (inlineRun) {
            updateInlineRunUi(message.id, {
              disabled: true,
              buttonText: "中断中",
              statusText: "正在中断命令",
              statusClass: "warn"
            });
            if (inlineRun.queueId) {
              updateQueueStatus(stepId, "正在中断当前命令，队列已暂停", "warn");
              appendQueueLog(stepId, `正在中断：${inlineRun.command}`, "warn");
            }
          }
          return;
        }

        if (message.type === "stdout" || message.type === "stderr") {
          const text = String(message.data || "").trim();
          if (!text) return;
          state.stepOutputs[stepId].lines.push(text);
          appendLine(stepId, text, message.type === "stderr" ? "warn" : "");
          if (inlineRun) {
            updateInlineRunUi(message.id, {
              buttonText: "执行中",
              statusText: message.type === "stderr" ? "收到错误输出" : "收到命令输出",
              statusClass: message.type === "stderr" ? "warn" : ""
            });
          }
          return;
        }

        if (message.type === "stopped") {
          appendLine(stepId, "命令已中断", "warn");
          if (inlineRun) {
            updateInlineRunUi(message.id, {
              disabled: false,
              buttonText: "重新执行",
              statusText: "命令已中断",
              statusClass: "warn"
            });
            if (inlineRun.queueId) {
              const queue = state.aiQueues[inlineRun.queueId];
              if (queue) {
                queue.currentRunId = null;
                queue.currentCommand = "";
                updateQueueStatus(stepId, "当前命令已中断，队列已暂停，可继续", "warn");
                appendQueueLog(stepId, `命令已中断：${inlineRun.command}`, "warn");
              }
            }
            delete state.inlineRuns[message.id];
          }
          return;
        }

        if (message.type === "error") {
          appendLine(stepId, message.data, "warn");
          if (inlineRun) {
            updateInlineRunUi(message.id, {
              disabled: false,
              buttonText: "重试执行",
              statusText: message.data,
              statusClass: "warn"
            });
            if (inlineRun.queueId) {
              const queue = state.aiQueues[inlineRun.queueId];
              if (queue?.skipRequested) {
                appendQueueLog(stepId, `已跳过失败命令：${inlineRun.command}`, "warn");
                updateQueueStatus(stepId, `已跳过失败命令，继续下一条`, "warn");
                  queue.currentRunId = null;
                  queue.currentCommand = "";
                processNextInlineQueue(inlineRun.queueId);
              } else {
                updateQueueStatus(stepId, `队列执行失败：${message.data}`, "warn");
                appendQueueLog(stepId, `队列失败：${inlineRun.command}`, "warn");
                delete state.aiQueues[inlineRun.queueId];
              }
            }
          }
          if (!isCommonActionId(stepId)) {
            showErrorPanel(stepId);
          }
          return;
        }

        if (message.type === "exit") {
          const code = Number(message.code ?? 1);
          state.stepOutputs[stepId].exitCode = code;
          if (code === 0) {
            appendLine(stepId, "命令执行完成", "ok");
            if (!inlineRun && !isCommonActionId(stepId)) {
              markStepDone(stepId);
            }
            if (inlineRun) {
              updateInlineRunUi(message.id, {
                disabled: false,
                buttonText: "再次执行",
                statusText: "执行成功",
                statusClass: "ok"
              });
              if (inlineRun.queueId) {
                const queue = state.aiQueues[inlineRun.queueId];
                if (queue?.skipRequested) {
                  appendQueueLog(stepId, `已跳过命令：${inlineRun.command}`, "warn");
                  updateQueueStatus(stepId, "已跳过当前命令，继续下一条", "warn");
                  queue.currentRunId = null;
                  queue.currentCommand = "";
                } else {
                  appendQueueLog(stepId, `执行成功：${inlineRun.command}`, "ok");
                  if (queue) {
                    queue.currentRunId = null;
                    queue.currentCommand = "";
                  }
                }
                if (queue?.paused) {
                  updateQueueStatus(stepId, "队列已暂停，可继续", "warn");
                } else {
                  processNextInlineQueue(inlineRun.queueId);
                }
              }
            }
            if (
              isCommonActionId(stepId) ||
              stepId === "openclaw" ||
              stepId === "version" ||
              stepId === "gateway"
            ) {
              loadSystemInfo();
            }
          } else {
            appendLine(stepId, `命令退出码: ${code}`, "warn");
            if (inlineRun) {
              updateInlineRunUi(message.id, {
                disabled: false,
                buttonText: "重试执行",
                statusText: `执行失败，退出码 ${code}`,
                statusClass: "warn"
              });
              if (inlineRun.queueId) {
                const queue = state.aiQueues[inlineRun.queueId];
                if (queue?.skipRequested) {
                  appendQueueLog(stepId, `已跳过失败命令：${inlineRun.command}`, "warn");
                  updateQueueStatus(stepId, "已跳过当前命令，继续下一条", "warn");
                  queue.currentRunId = null;
                  queue.currentCommand = "";
                  if (queue.paused) {
                    updateQueueStatus(stepId, "队列已暂停，可继续", "warn");
                  } else {
                    processNextInlineQueue(inlineRun.queueId);
                  }
                } else {
                  updateQueueStatus(stepId, `队列执行失败，退出码 ${code}`, "warn");
                  appendQueueLog(
                    stepId,
                    `队列失败：${inlineRun.command}（退出码 ${code}）`,
                    "warn"
                  );
                  delete state.aiQueues[inlineRun.queueId];
                }
              }
            }
          }
          if (inlineRun) {
            delete state.inlineRuns[message.id];
          }
          const joined = state.stepOutputs[stepId].lines.join("\n");
          if (!isCommonActionId(stepId) && (code !== 0 || hasErrorText(joined))) {
            showErrorPanel(stepId);
          }
        }
      }

      function hasErrorText(text) {
        const lower = String(text);
        return [
          "error",
          "Error",
          "ERROR",
          "ENOENT",
          "EACCES",
          "EPERM",
          "failed",
          "Failed",
          "not found",
          "not recognized",
          "permission denied",
          "npm ERR"
        ].some((token) => lower.includes(token));
      }

      function runStep(stepId) {
        const step = getStepById(stepId);
        if (!step) return;
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          toast("Bridge 未连接，已保留复制按钮供手动执行");
          return;
        }
        state.stepOutputs[stepId] = { lines: [], exitCode: null, terminal: [] };
        renderTerminal(stepId);
        state.ws.send(JSON.stringify({ id: stepId, type: "run", command: step.cmd }));
      }

      async function copyCommand(stepId) {
        const step = getStepById(stepId);
        if (!step) return;
        await navigator.clipboard.writeText(step.cmd);
        toast("命令已复制");
      }

      function runCommonAction(actionId) {
        const action = getCommonActionById(actionId);
        if (!action) return;
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          toast("Bridge 未连接，已保留复制按钮供手动执行");
          return;
        }

        const runId = getCommonActionRunId(actionId);
        state.stepOutputs[runId] = { lines: [], exitCode: null, terminal: [] };
        renderTerminal(runId);
        state.ws.send(JSON.stringify({ id: runId, type: "run", command: action.cmd }));
      }

      async function copyCommonAction(actionId) {
        const action = getCommonActionById(actionId);
        if (!action) return;
        await navigator.clipboard.writeText(action.cmd);
        toast("命令已复制");
      }

      function stopCommonAction(actionId) {
        if (!state.bridgeReady || !state.ws || state.ws.readyState !== WebSocket.OPEN) {
          toast("Bridge 未连接，当前无法中断命令");
          return;
        }

        state.ws.send(JSON.stringify({ id: getCommonActionRunId(actionId), type: "stop" }));
      }

      async function loadConfigPaths() {
        try {
          const res = await fetch(`${API_BASE}/config/paths`);
          const data = await res.json();
          state.configPaths = data.paths || [];
          renderConfigPathHint();
        } catch {
          state.configPaths = [];
          renderConfigPathHint();
        }
      }

      function renderConfigPathHint() {
        const el = document.getElementById("config-path-hint");
        if (!state.configPaths.length) {
          el.innerHTML = "未探测到本机可写配置路径，可下载后手动替换。";
          return;
        }
        el.innerHTML = state.configPaths
          .map((item) => {
            const suffix = item.exists ? "已有旧文件，会先备份" : "将新建配置文件";
            return `<div>推荐路径：${escapeHtml(item.path)}，${suffix}</div>`;
          })
          .join("");
      }

      function renderConfigWriteResult(html = "") {
        document.getElementById("config-write-result").innerHTML = html;
      }

      function getConfigPayload() {
        return {
          apiKey: document.getElementById("api-key-input").value.trim(),
          baseUrl: document.getElementById("base-url-input").value.trim(),
          model: document.getElementById("model-input").value.trim(),
          workspace: document.getElementById("workspace-input").value.trim()
        };
      }

      async function generateConfig() {
        const payload = getConfigPayload();
        if (!payload.apiKey) {
          toast("请先输入 API Key");
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/config/preview`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "生成配置失败");
          state.generatedConfigText = data.configText;
          renderConfigWriteResult("");
          document.getElementById("config-preview").textContent = data.configText;
          await loadConfigPaths();
          toast("配置文件已生成");
        } catch (error) {
          toast(error.message);
        }
      }

      function downloadConfigFile() {
        if (!state.generatedConfigText) {
          toast("请先生成配置文件");
          return;
        }

        const blob = new Blob([state.generatedConfigText], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "openclaw.json";
        a.click();
        URL.revokeObjectURL(url);
        toast("已下载 openclaw.json");
      }

      async function replaceConfigFile() {
        const payload = getConfigPayload();
        if (!payload.apiKey) {
          toast("请先输入 API Key");
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/config/write`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ...payload, backup: true })
          });
          const data = await res.json();
          if (!res.ok) {
            if (data.fallbackPath) {
              renderConfigWriteResult(
                `自动写入失败。已生成临时配置文件，请手动替换。<br><a class="link-btn" href="${data.fallbackUrl || "#"}" target="_blank">下载生成文件</a><br><span class="mono">${escapeHtml(data.fallbackPath)}</span>`
              );
            }
            const detail = data.fallbackPath
              ? `${data.error}。已生成临时配置文件，请手动替换。`
              : data.error || "写入配置失败";
            throw new Error(detail);
          }
          renderConfigWriteResult(
            `配置写入成功：<span class="mono">${escapeHtml(data.path)}</span>${
              data.backupPath ? `<br>备份文件：<span class="mono">${escapeHtml(data.backupPath)}</span>` : ""
            }`
          );
          const suffix = data.backupPath ? `，已备份到 ${data.backupPath}` : "";
          toast(`配置已写入: ${data.path}${suffix}`);
          await loadConfigPaths();
          await loadSystemInfo();
        } catch (error) {
          toast(error.message);
        }
      }

      function showErrorPanel(stepId) {
        const parent = document.getElementById(`step-${stepId}`);
        const old = document.getElementById(`error-panel-${stepId}`);
        if (old) old.remove();
        const step = getStepById(stepId);
        const snippet = escapeHtml(getErrorExcerpt(stepId) || "暂无可用输出");

        const panel = document.createElement("div");
        panel.id = `error-panel-${stepId}`;
        panel.className = "error-panel";
        panel.innerHTML = `
          <div class="error-head">
            检测到报错，建议先查报错库，再使用 AI 分析。
            <div class="error-sub">
              命令：${escapeHtml(step?.cmd || "未知命令")}
            </div>
          </div>
          <div class="error-body">
            <div class="actions">
              <button class="btn warn" onclick="searchLibrary('${stepId}')">查报错库</button>
              <button class="btn success" onclick="analyzeWithAI('${stepId}')">AI 分析</button>
              <button class="btn secondary" id="error-result-toggle-${stepId}" onclick="toggleErrorResult('${stepId}')">收起结果</button>
              <button class="btn secondary" onclick="clearErrorResult('${stepId}')">清空结果</button>
              <button class="btn secondary" id="error-toggle-${stepId}" onclick="toggleErrorFull('${stepId}')">展开完整输出</button>
              <button class="btn secondary" onclick="copyText(${JSON.stringify(getFullErrorText(stepId))}, '已复制原始报错')">复制原始报错</button>
            </div>
            <div class="error-snippet">${snippet}</div>
            <div id="error-full-${stepId}" class="error-full hidden">${escapeHtml(getFullErrorText(stepId) || "暂无完整输出")}</div>
            <div id="error-result-wrap-${stepId}">
              <div id="error-result-${stepId}" style="margin-top: 12px;"></div>
              <div id="error-feedback-${stepId}"></div>
            </div>
          </div>
        `;
        parent.appendChild(panel);
        setSearchPref(stepId, getSearchPref(stepId));
        searchLibrary(stepId);
      }

      async function searchLibrary(stepId) {
        const output = state.stepOutputs[stepId];
        const resultEl = document.getElementById(`error-result-${stepId}`);
        renderFeedback(stepId, "");
        if (!output || !resultEl) return;
        const searchPref = getSearchPref(stepId);
        resultEl.innerHTML = `
          <div class="result-toolbar">
            <div class="result-title">正在搜索报错库</div>
            <div class="result-status">提取错误指纹并匹配中...</div>
          </div>
        `;

        try {
          const query = output.lines.join("\n").slice(0, 1000);
          const version = getCurrentOpenClawVersion();
          const res = await fetch(
            `${API_BASE}/errors/search?query=${encodeURIComponent(query)}&os=${encodeURIComponent(
              state.os === "windows" ? "Windows" : "macOS"
            )}&version=${encodeURIComponent(version)}&limit=${encodeURIComponent(searchPref.limit)}&sort=${encodeURIComponent(searchPref.sort)}`
          );
          const data = await res.json();
          if (!Array.isArray(data) || !data.length) {
            resultEl.innerHTML = `
              <div class="result-toolbar">
                <div class="result-title">报错库暂无匹配</div>
                <div class="result-actions">
                  <select class="compact-select" onchange="changeSearchSort('${stepId}', this.value)">
                    <option value="best" ${searchPref.sort === "best" ? "selected" : ""}>最相关</option>
                    <option value="votes" ${searchPref.sort === "votes" ? "selected" : ""}>点赞最多</option>
                    <option value="latest" ${searchPref.sort === "latest" ? "selected" : ""}>最新记录</option>
                  </select>
                  <button class="btn secondary" onclick="resetSearchFilters('${stepId}')">重置筛选</button>
                </div>
              </div>
              <div class="empty-state">
                没有找到足够接近的历史记录。建议点击“AI 分析”获取针对当前输出的解释和解决步骤。
              </div>
            `;
            return;
          }

          resultEl.innerHTML = `
            <div class="result-toolbar">
              <div class="result-title">找到 ${data.length} 条可能有用的结果</div>
              <div class="result-actions">
                <select class="compact-select" onchange="changeSearchSort('${stepId}', this.value)">
                  <option value="best" ${searchPref.sort === "best" ? "selected" : ""}>最相关</option>
                  <option value="votes" ${searchPref.sort === "votes" ? "selected" : ""}>点赞最多</option>
                  <option value="latest" ${searchPref.sort === "latest" ? "selected" : ""}>最新记录</option>
                </select>
                <select class="compact-select" onchange="changeSearchSource('${stepId}', this.value)">
                  <option value="all" ${searchPref.source === "all" ? "selected" : ""}>全部来源</option>
                  <option value="llm" ${searchPref.source === "llm" ? "selected" : ""}>仅 AI</option>
                  <option value="community" ${searchPref.source === "community" ? "selected" : ""}>仅报错库</option>
                </select>
                <label class="compact-check">
                  <input type="checkbox" ${searchPref.sameVersionOnly ? "checked" : ""} onchange="toggleVersionFilter('${stepId}', this.checked)" />
                  仅当前版本
                </label>
                <label class="compact-check">
                  <input type="checkbox" ${searchPref.minVotes > 0 ? "checked" : ""} onchange="toggleHighVotesFilter('${stepId}', this.checked)" />
                  仅高票
                </label>
                <button class="btn secondary" onclick="resetSearchFilters('${stepId}')">重置筛选</button>
                <button class="btn secondary" onclick="loadMoreSimilar('${stepId}')">查看更多相似记录</button>
              </div>
            </div>
            ${data
            .map(
              (item) => {
                const feedbackKey = makeFeedbackKey("library", item.id);
                const feedback = getStoredFeedback(feedbackKey);
                const currentDiffText = getErrorExcerpt(stepId) || getFullErrorText(stepId);
                return `
                <div class="solution-card">
                  <div class="solution-meta">
                    <div>${renderSourceBadge(item.source || "community")}</div>
                    <div>👍 ${item.votes || 0} · 有帮助 ${item.helpful_count || 0} · 没解决 ${item.not_solved_count || 0}</div>
                  </div>
                  <div class="solution-summary">
                    <div>系统：${escapeHtml(item.os || "通用")}</div>
                    <div>版本：${escapeHtml(item.openclaw_version || "未知")}</div>
                    <div>命令：<span class="mono">${escapeHtml(item.command || "未知命令")}</span></div>
                  </div>
                  <div class="solution-text">${formatSolution(item.solution || "")}</div>
                  ${renderDiffPreview(currentDiffText, item.error_pattern || "")}
                  <div class="solution-footer">
                    <button class="btn secondary" onclick="copyText(${JSON.stringify(String(item.solution || ""))}, '已复制解决方案')">复制方案</button>
                    <button class="btn secondary" onclick="voteError(${item.id}, this)">👍 标记有用</button>
                    <button class="btn secondary" ${feedback?.status === "helpful" ? "disabled" : ""} onclick="markResultHelpful('${feedbackKey}', this, '感谢反馈，这条记录已记为有帮助。', ${item.id})">${feedback?.status === "helpful" ? "已反馈有帮助" : "有帮助"}</button>
                    <button class="btn secondary" ${feedback?.status === "not_solved" ? "disabled" : ""} onclick="markResultNotSolved('${feedbackKey}', '${stepId}', 'library', this, ${item.id})">${feedback?.status === "not_solved" ? "已记录没解决" : "没解决"}</button>
                    <button class="btn secondary" onclick="copyText(${JSON.stringify(String(item.error_pattern || ""))}, '已复制历史报错')">复制历史报错</button>
                    <span class="inline-msg">${item.error_fingerprint ? escapeHtml(item.error_fingerprint) : ""}</span>
                    ${renderFeedbackHint(feedbackKey)}
                  </div>
                </div>
              `;
              }
            )
            .join("")}
          `;
        } catch {
          resultEl.innerHTML = `
            <div class="result-toolbar">
              <div class="result-title">报错库请求失败</div>
              <div class="result-status">可以尝试 AI 分析</div>
            </div>
            <div class="empty-state">当前无法连接报错库，请检查本地服务后重试。</div>
          `;
        }
      }

      async function analyzeWithAI(stepId) {
        const output = state.stepOutputs[stepId];
        const step = getStepById(stepId);
        const resultEl = document.getElementById(`error-result-${stepId}`);
        const payload = getConfigPayload();
        renderFeedback(stepId, "");
        if (!output || !resultEl) return;
        if (!payload.apiKey) {
          resultEl.innerHTML = `
            <div class="result-toolbar">
              <div class="result-title">缺少 API Key</div>
              <div class="result-status">需要先配置后才能调用 AI</div>
            </div>
            <div class="empty-state">请先在右侧配置区域输入 API Key，再点击“AI 分析”。</div>
          `;
          return;
        }

        resultEl.innerHTML = `
          <div class="result-toolbar">
            <div class="result-title">AI 正在分析当前报错</div>
            <div class="result-status">会结合命令、系统和输出内容</div>
          </div>
        `;

        try {
          const version = getCurrentOpenClawVersion();
          const feedbackKey = makeFeedbackKey(
            "ai",
            `${stepId}:${simpleHash(getFullErrorText(stepId))}`
          );
          const feedback = getStoredFeedback(feedbackKey);
          const res = await fetch(`${API_BASE}/llm/analyze`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              apiKey: payload.apiKey,
              baseUrl: payload.baseUrl,
              model: payload.model,
              error_text: output.lines.join("\n").slice(0, 2000),
              command: step ? step.cmd : "",
              os: state.os === "windows" ? "Windows" : "macOS",
              openclaw_version: version
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "AI 分析失败");
          resultEl.innerHTML = `
            <div class="solution-card" id="solution-${stepId}">
              <div class="solution-meta">
                <div>${renderSourceBadge("llm")}</div>
                <div>${escapeHtml(version || "未检测到版本")}</div>
              </div>
              <div class="solution-summary">
                <div>命令：<span class="mono">${escapeHtml(step ? step.cmd : "未知命令")}</span></div>
                <div>系统：${state.os === "windows" ? "Windows" : "macOS"}</div>
              </div>
              ${renderAiSections(data.solution || "")}
              ${renderAiActionItems(data.solution || "").replaceAll("__CURRENT_STEP__", stepId)}
              <div class="solution-footer">
                <button class="btn success" onclick="saveToLibrary('${stepId}', this)">保存到报错库</button>
                <button class="btn secondary" ${feedback?.status === "helpful" ? "disabled" : ""} onclick="markResultHelpful('${feedbackKey}', this, '这条 AI 方案对你有帮助，建议保存到报错库。')">${feedback?.status === "helpful" ? "已反馈有帮助" : "有帮助"}</button>
                <button class="btn secondary" ${feedback?.status === "not_solved" ? "disabled" : ""} onclick="markResultNotSolved('${feedbackKey}', '${stepId}', 'ai', this)">${feedback?.status === "not_solved" ? "已记录没解决" : "没解决"}</button>
                <button class="btn secondary" onclick="copyText(${JSON.stringify(String(data.solution || ""))}, '已复制 AI 方案')">复制方案</button>
                <button class="btn secondary" onclick="copyText(${JSON.stringify(getFullErrorText(stepId))}, '已复制当前报错')">复制报错</button>
                <button class="btn secondary" onclick="analyzeWithAI('${stepId}')">重新分析</button>
                <span class="inline-msg">保存后，下次遇到相似报错会优先命中报错库。</span>
                ${renderFeedbackHint(feedbackKey)}
              </div>
            </div>
          `;
          document.getElementById(`solution-${stepId}`).__solution = data.solution;
          renderQueueUi(stepId);
        } catch (error) {
          resultEl.innerHTML = `<div class="muted">${escapeHtml(error.message)}</div>`;
        }
      }

      async function saveToLibrary(stepId, btn) {
        const card = btn.closest(".solution-card");
        const output = state.stepOutputs[stepId];
        const step = getStepById(stepId);
        if (!card || !output || !card.__solution) return;

        try {
          btn.disabled = true;
          btn.textContent = "保存中...";
          const res = await fetch(`${API_BASE}/errors`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              error_pattern: output.lines.join("\n").slice(0, 2000),
              command: step ? step.cmd : "",
              os: state.os === "windows" ? "Windows" : "macOS",
              openclaw_version: getCurrentOpenClawVersion(),
              solution: card.__solution,
              source: "llm"
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "保存失败");
          btn.textContent = "已保存";
          let msg = card.querySelector(".inline-msg.save-status");
          if (!msg) {
            msg = document.createElement("span");
            msg.className = "inline-msg ok save-status";
            btn.parentElement.appendChild(msg);
          }
          msg.textContent = `已保存到报错库，记录 ID：${data.id}`;
          await searchLibrary(stepId);
        } catch (error) {
          btn.disabled = false;
          btn.textContent = "保存到报错库";
          toast(error.message);
        }
      }

      async function voteError(id, btn) {
        try {
          const res = await fetch(`${API_BASE}/errors/${id}/vote`, { method: "POST" });
          if (!res.ok) throw new Error("点赞失败");
          btn.disabled = true;
          btn.textContent = "已标记有用";
        } catch (error) {
          toast(error.message);
        }
      }

      async function checkHealth() {
        try {
          const res = await fetch(`${API_BASE}/health`);
          if (!res.ok) throw new Error("Health check failed");
          state.bridgeReady = true;
        } catch {
          state.bridgeReady = false;
        }
        renderHeader();
      }

      async function loadSystemInfo() {
        try {
          const res = await fetch(`${API_BASE}/system/info`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "系统状态获取失败");
          state.systemInfo = data;
          if (data.os === "Windows") {
            state.os = "windows";
          } else if (data.os === "macOS") {
            state.os = "mac";
          }
          renderHeader();
          renderSystemInfo();
          syncSystemInfoToSteps();
        } catch (error) {
          state.systemInfo = null;
          renderSystemInfo();
          console.error(error);
        }
      }

      document.getElementById("workspace-input").value = getWorkspaceDefault();
      renderHeader();
      renderStepsMode();
      renderSystemInfo();
      renderSteps();
      renderCommonActions();
      checkHealth();
      connectWS();
      loadConfigPaths();
      loadSystemInfo();
    </script>
  </body>
</html>
